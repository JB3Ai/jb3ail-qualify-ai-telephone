# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - os3grid

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build frontend
        run: |
          npm install
          npm run build --if-present
          npx tsc -p tsconfig.server.json --skipLibCheck
          echo "Server compiled to dist-server/ ✓"

      - name: Write production .env from secrets
        run: |
          cat > .env << 'EOF'
          NODE_ENV=production
          PORT=8080
          DOMAIN=os3grid-fjgcb8hzfjhzcqhr.southafricanorth-01.azurewebsites.net
          AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT=https://os3gridopenai.openai.azure.com/
          AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION=2024-05-01-preview
          SPEECH_KEY=${{ secrets.SPEECH_KEY }}
          SPEECH_REGION=southafricanorth
          AZURE_AI_SERVICES_ENDPOINT=https://southafricanorth.api.cognitive.microsoft.com/
          AZURE_STT_ENDPOINT=https://southafricanorth.stt.speech.microsoft.com
          AZURE_TTS_ENDPOINT=https://southafricanorth.tts.speech.microsoft.com
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          EOF

      - name: Prepare lean deployment package
        run: |
          mkdir deploy-package
          cp package.json deploy-package/
          cp .env deploy-package/
          cp -r dist-server deploy-package/
          cp -r dist deploy-package/
          # Prevent Oryx from re-running npm build (no source files in package)
          echo -e "[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT=false" > deploy-package/.deployment
          # Install production dependencies on Linux (native, no cross-arch issues)
          cd deploy-package && npm install --omit=dev --ignore-scripts
          echo "Package size:"
          du -sh ../deploy-package/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'os3grid'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_37C6871AB3C04757BE05915D2A914563 }}
