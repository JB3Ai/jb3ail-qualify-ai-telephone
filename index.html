    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            black: '#0A0C10',
                            deep: '#121620', // Gradient End
                            steel: '#22324A', // Secondary Structure
                        },
                        ui: {
                            graphite: '#121212', // Panels
                            soft: '#E6E6E6', // Cards
                        },
                        accent: {
                            green: '#66FF66', // Tech Green
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg-navy-black: #0A0C10;
            --bg-navy-deep: #121620;
            --structural-slate: #22324A;
            --ui-graphite: #121212;
            --ui-soft-grey: #E6E6E6;
            --accent-green: #66FF66;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-navy-black) 0%, var(--bg-navy-deep) 100%);
            color: #f1f5f9;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(34, 50, 74, 0.3);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(102, 255, 102, 0.4);
        }

        .accent-glow {
            box-shadow: 0 0 30px rgba(102, 255, 102, 0.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 255, 102, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 255, 102, 0.3);
        }

        @keyframes subtle-pulse {

            0%,
            100% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }
        }

        .animate-subtle-pulse {
            animation: subtle-pulse 4s infinite ease-in-out;
        }
    </style>
